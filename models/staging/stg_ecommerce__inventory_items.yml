version: 2

models:
  - name: stg_ecommerce__inventory_items
    description: "Inventory items representing individual product units in stock"
    columns:
      - name: inventory_item_id
        description: "Unique identifier for each inventory item"
        tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error

      - name: product_id
        description: "Foreign key to the products table"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_ecommerce__products')
                field: product_id

      - name: product_distribution_center_id
        description: "Foreign key to the distribution center where this item is stored"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_ecommerce__distribution_centers')
                field: distribution_center_id

      - name: product_name
        description: "Name of the product"
        tests:
          - not_null

      - name: product_category
        description: "Category of the product"
        tests:
          - not_null

      - name: product_brand
        description: "Brand of the product"
        tests:
          - not_null

      - name: product_department
        description: "Department the product belongs to (e.g., Men, Women)"
        tests:
          - not_null

      - name: product_sku
        description: "Stock keeping unit identifier for the product"
        tests:
          - not_null

      - name: cost
        description: "Cost of the inventory item"
        tests:
          - not_null

      - name: product_retail_price
        description: "Retail price of the product"
        tests:
          - not_null

      - name: created_at
        description: "Timestamp when the inventory item was created"
        tests:
          - not_null

      - name: sold_at
        description: "Timestamp when the inventory item was sold (null if unsold)"
