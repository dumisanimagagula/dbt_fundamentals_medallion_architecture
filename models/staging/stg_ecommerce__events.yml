version: 2

models:
  - name: stg_ecommerce__events
    description: "Web events captured from user interactions on the ecommerce platform"
    columns:
      - name: event_id
        description: "Unique identifier for each event"
        tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error

      - name: user_id
        description: "Foreign key to the users table. Null for anonymous visitors."
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_ecommerce__users')
                field: user_id
              config:
                where: "user_id IS NOT NULL"

      - name: sequence_number
        description: "Sequence number of the event within the session"
        tests:
          - not_null

      - name: session_id
        description: "Identifier for the user session"
        tests:
          - not_null

      - name: event_type
        description: "Type of event (e.g., cart, purchase, department, product, home, cancel)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['cart', 'purchase', 'department', 'product', 'home', 'cancel']

      - name: browser
        description: "Browser used by the user during the event"
        tests:
          - not_null

      - name: traffic_source
        description: "Source of traffic that led the user to the site"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Search', 'Organic', 'Facebook', 'Email', 'Display', 'Adwords']
              config:
                severity: warn

      - name: uri
        description: "URI path of the page where the event occurred"
        tests:
          - not_null

      - name: ip_address
        description: "IP address of the user"
        tests:
          - not_null

      - name: city
        description: "City of the user at the time of the event"

      - name: state
        description: "State of the user at the time of the event"

      - name: postal_code
        description: "Postal code of the user at the time of the event"

      - name: created_at
        description: "Timestamp when the event was created"
        tests:
          - not_null
