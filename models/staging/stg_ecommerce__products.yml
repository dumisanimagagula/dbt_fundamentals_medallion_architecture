version: 2

models:
  - name: stg_ecommerce__products
    description: "Table of products on the online store"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error

      - name: distribution_center_id
        description: "Foreign key to the distribution center where the product is stored"
        tests:
          - not_null

      - name: product_name
        description: "Name of the product"
        tests:
          - not_null:
              config:
                severity: warn

      - name: category
        description: "Product category (e.g. Jeans, Accessories, Swim)"
        tests:
          - not_null

      - name: brand
        description: "Brand of the product"
        tests:
          - not_null:
              config:
                severity: warn

      - name: sku
        description: "Stock keeping unit identifier for the product"
        tests:
          - not_null

      - name: department
        description: "Whether the item is Menswear or Womenswear"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                    - "Men"
                    - "Women"
                quote: true

      - name: cost
        description: "How much the product cost the business to purchase"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: retail_price
        description: "How much the product retails for on the online store"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= cost"
